{% if site.favicon %}
  <link rel="icon" type="image/png" href="{{ site.favicon | relative_url }}">
  <!-- Pre Apple zariadenia (voliteľné) -->
  <link rel="apple-touch-icon" href="{{ site.favicon | relative_url }}">
{% endif %}

<style>
    .page-heading { display: none !important }
    .site-footer { text-align: center;}
    .site-footer-repo { opacity: 0; vertical-align: middle }
    .site-footer-repo:hover { opacity: 1 }
</style>
